<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulador de Consórcio</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <div class="logo-mark">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
  </div>
  <h1>Simulador de Consórcio</h1>
  <span>Calcule e compare planos</span>
</header>

<div class="container">

  
  <div class="panel">
    <p class="panel-title">Configurar simulação</p>

    <div class="field">
      <label>Bem desejado</label>
      <select id="tipo" onchange="aplicarDefaults()">
        <option value="imovel">Imóvel</option>
        <option value="auto">Automóvel</option>
        <option value="moto">Motocicleta</option>
        <option value="servico">Serviço / Outros</option>
      </select>
    </div>

    <div class="field">
      <label>Valor da carta de crédito</label>
      <div class="prefix-wrap">
        <span>R$</span>
        <input type="number" id="valor" value="300000" min="5000" step="1000" oninput="sincValor()" />
      </div>
    </div>

    <div class="field">
      <label>Prazo — <span class="range-value" id="prazo-out">200 meses</span></label>
      <input type="range" id="prazo" min="12" max="240" step="12" value="200" oninput="sincPrazo()" />
      <div class="range-labels"><span>12 m</span><span>240 m</span></div>
    </div>

    <div class="field">
      <label>Taxa de administração anual (%)</label>
      <input type="number" id="taxa-adm" value="1.20" min="0.1" max="5" step="0.1" oninput="atualizarTaxaLabel()" />
    </div>

    <div class="field">
      <label>Fundo de reserva anual (%)</label>
      <input type="number" id="taxa-res" value="0.50" min="0" max="2" step="0.1" oninput="atualizarTaxaLabel()" />
    </div>

    <div class="field">
      <label>Seguro de vida anual (%)</label>
      <input type="number" id="taxa-seg" value="0.10" min="0" max="1" step="0.05" oninput="atualizarTaxaLabel()" />
    </div>

    <div class="taxa-group">
      <div class="taxa-item">Total de taxas/ano<strong id="taxa-total-label">1,80%</strong></div>
      <div class="taxa-item">Total de taxas/mês<strong id="taxa-mes-label">0,1500%</strong></div>
    </div>

    <button class="btn" onclick="simular()">Simular agora</button>
  </div>

 
  <div class="results" id="results">
    <div class="panel">
      <div class="empty">
        <div class="empty-icon">📊</div>
        <p>Preencha os dados ao lado e clique em <strong>Simular agora</strong> para ver os resultados.</p>
      </div>
    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
